repos:
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.1
    hooks:
        # Run the linter.
        - id: ruff
          args: [ --fix ]
        # Run the formatter.
        - id: ruff-format
-   repo: https://github.com/PyCQA/flake8
    rev: 6.1.0
    hooks:
    -   id: flake8
        args: ["--config", ".flake8"]
-   repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
    -   id: bandit
        args: ["--ini", ".bandit", "-r", "sources/backend"]
-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.6.1
    hooks:
    -   id: mypy
        args: ["--config-file", "mypy.ini"]
-   repo: local
    hooks:
    -   id: frontend-lint
        name: frontend eslint
        language: system
        entry: bash -c 'cd sources/frontend && npm run lint --silent'
        files: ^(sources/frontend|tests/frontend)/.*\.(ts|tsx|js)$
        pass_filenames: false
    -   id: frontend-typecheck
        name: frontend tsc --noEmit
        language: system
        entry: bash -c 'cd sources/frontend && npm run typecheck --silent'
        files: ^(sources/frontend|tests/frontend)/.*\.(ts|tsx)$
        pass_filenames: false
    -   id: frontend-format
        name: frontend prettier check
        language: system
        entry: bash -c 'cd sources/frontend && npm run format:check --silent'
        files: ^(sources/frontend|tests/frontend)/.*\.(ts|tsx|js|json|css|md)$
        pass_filenames: false
    -   id: frontend-test
        name: frontend vitest
        language: system
        entry: bash -c 'cd sources/frontend && npm run test --silent'
        files: ^(sources/frontend|tests/frontend)/.*\.(ts|tsx)$
        pass_filenames: false
        stages: [pre-push]